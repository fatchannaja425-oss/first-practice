<!DOCTYPE html>
<html>
<head>
    <title>Pesan Rahasia</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            margin-top: 100px;
            background-color: #ffe6f0;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            margin: 10px;
            cursor: pointer;
        }

        #tidak {
            position: absolute;
        }
    </style>
</head>
<body>

    <h1>Malam minggu nih, jalan-jalan yuk? ❤️</h1>

    <a href="iya.html">
        <button>Iya</button>
    </a>

    <button id="tidak" onmouseover="lari()">Tidak</button>

    <script>
        function lari() {
            var x = Math.random() * window.innerWidth;
            var y = Math.random() * window.innerHeight;
            
            document.getElementById("tidak").style.left = x + "px";
            document.getElementById("tidak").style.top = y + "px";
        }
    </script>

</body>
</html>
