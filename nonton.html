<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nonton</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            margin-top: 20px;
            background-color: #8bdcf9;
        }
        
img {
    max-width: 450px;
    height: auto;
}
.pilihan {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    align-items: center;
}

.pilihan a {
    text-decoration: none;
    color: rgb(0, 0, 0);
}


.pilihan a:hover {
    color: rgb(33, 49, 227);
}
.pilihan a:active {
    color: red;
}
.pilihan a:visited {
    color: purple;
}
.pilihan {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    justify-items: center; /* bikin card di tengah kolom */
}

.card {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-decoration: none;
    color: black;
    transition: transform 0.2s, filter 0.2s; /* animasi smooth */
}

.card img {
    max-width: 450px;
    height: auto;
}

.card:hover {
    transform: scale(1.05); /* seluruh card membesar */
    filter: brightness(1.1); /* optional: lebih terang */
}
       

       
    </style>
</head>
<body>
 <h2>Kita mau nonton dimana?</h2> 
 <div class="pilihan">
    <a href="okebioskop.html" class="card">
        <h3>a. Transmart Pekalongan XXI</h3>
        <img src="transmart.png" alt="">
    </a>

    <a href="okebioskop.html" class="card">
        <h3>b. XXI Pekalongan</h3>
        <img src="xxi.png" alt="">
    </a>
</div>
</body>
</html>
